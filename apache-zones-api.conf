# ZONES — Apache alias (انسخ هذا الملف أو شغّل SETUP-XAMPP-API.bat)

    Alias /zones-api "C:/Users/DELL/Desktop/team_zones/zones-backend-laravel/public"
    <Directory "C:/Users/DELL/Desktop/team_zones/zones-backend-laravel/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

ضعه داخل <IfModule alias_module> في:
C:\xampp\apache\conf\extra\httpd-xampp.conf
(قبل </IfModule> الأخير — بجانب phpmyadmin)

ثم من XAMPP: Stop Apache → Start Apache

اختبار: http://localhost/zones-api/api/lounges
